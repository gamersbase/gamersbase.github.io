<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML5 리스트 예제</title>
</head>
<body>
    <h2>1. 순서 없는 리스트</h2>
    <ul>
        <li>사과</li>
        <li>바나나</li>
        <li>오렌지</li>
    </ul>
    <h2>2. 순서 있는 리스트</h2>
    <ol>
        <li>HTML 배우기</li>
        <li>CSS 배우기</li>
        <li>JavaScript 배우기</li>
    </ol>
    <h2>3. 설명 리스트</h2>
    <dl>
        <dt>HTML</dt>
        <dd>웹 문서의 구조를 정의하는 마크업 언어</dd>
        <dt>CSS</dt>
        <dd>웹 페이지의 스타일과 레이아웃을 지정하는 언어</dd>
        <dt>JavaScript</dt>
        <dd>웹 페이지에 동적인 기능을 추가하는 프로그래밍 언어</dd>
    </dl>
</body>
</html>
