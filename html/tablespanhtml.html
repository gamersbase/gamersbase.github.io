<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>예제 3-8 테이블 태그 줄 병합</title>
    </head>
    <table border="1">
        <caption>AI Software</caption>
        <!--테이블 헤더 행-->
        <tr>      <th>HTML5</th>
        <th>CSS3</th>
        <th>JavaScript</th>    </tr>
        <!--일반 데이터 행-->
        <tr>     <td>Contents</td>
        <td>Design</td>
    <td>Programming</td>     </tr>
    <!--colspan과 rowspan을 사용하는 행-->
    <tr>       <td colspan="2">colspan</td>  <!--HTML5 + CSS3 병합-->
    <td rowspan="2">rowspan</td>  <!--아래 행과 병합-->
</tr>
<!--rowspan의 영형을 받는 행-->
<tr>       <td>1</td>
<td>2</td>       </tr>
    </table>
</html>
