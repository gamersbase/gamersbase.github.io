<!DOCTYPE html>
<html>

        <title>예제3-9 표 크기 조정</title>
        <meta charset="utf-8">
    </head>
    <body>
        <table border="1" width="100%">
            <caption>AI Software</caption>
            <tr height="100px">
                <th>HTML5</th><th>CSS3</th><th>Javascript</th>

        </table>
    </body>
