<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANOTHER YOU | OFFICIAL SITE</title>
    <style>
        :root {
            --sky-blue: #e0f2fe;
            --deep-blue: #0369a1;
            --magic-glow: #7dd3fc;
            --text-dark: #0f172a;
        }

        body {
            margin: 0; padding: 0;
            background-color: #f8fafc;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* 헤더 섹션: 신비로운 하늘 배경 */
        header {
            height: 100vh;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 70%, #f8fafc),
                        url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070'); /* 설산/북유럽 느낌 배경 */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* 로고 이미지 스타일 */
        .main-logo {
            max-width: 600px;
            width: 80%;
            filter: drop-shadow(0 0 20px rgba(125, 211, 252, 0.6));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .hero-text {
            margin-top: -50px;
            font-size: 1.5rem;
            letter-spacing: 5px;
            color: var(--deep-blue);
            font-weight: bold;
            text-shadow: 0 0 10px white;
        }

        /* 컨텐츠 영역 */
        .container {
            max-width: 1000px;
            margin: -100px auto 100px;
            padding: 0 20px;
        }

        section {
            background: white;
            border-radius: 30px;
            padding: 50px;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            border: 1px solid rgba(125, 211, 252, 0.2);
        }

        h2 {
            font-size: 2rem;
            color: var(--deep-blue);
            text-align: center;
            margin-bottom: 30px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .feature-box {
            background: #f1f5f9;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            transition: 0.3s;
        }

        .feature-box:hover {
            transform: translateY(-5px);
            background: var(--sky-blue);
        }

        .magic-btn {
            display: block;
            width: fit-content;
            margin: 40px auto;
            padding: 20px 60px;
            background: linear-gradient(135deg, #0284c7, #7dd3fc);
            color: white;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(2, 132, 195, 0.3);
            transition: 0.3s;
        }

        .magic-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(2, 132, 195, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.jpg" alt="Another You Logo" class="main-logo">
        <p class="hero-text">북유럽의 신화, 당신의 마법으로 깨어나다</p>
        <a href="#" class="magic-btn">지금 사전예약 하기</a>
    </header>

    <div class="container">
        <section>
            <h2>❄️ WORLD SETTING</h2>
            <p style="text-align: center; line-height: 2; color: var(--text-gray);">
                세계수 이그드라실의 가지 끝에 걸린 아홉 개의 세상.<br>
                고대 룬 마법을 사용하는 마지막 계승자가 되어,<br>
                끝없는 설원과 신비로운 숲이 공존하는 **오픈월드**를 탐험하세요.
            </p>
        </section>

        <section>
            <div class="features">
                <div class="feature-box">
                    <h3>🔮 룬 마법 시스템</h3>
                    <p>8가지 속성의 룬을 조합하여 자신만의 강력한 마법을 창조하세요.</p>
                </div>
                <div class="feature-box">
                    <h3>⚔️ 신화 속의 적</h3>
                    <p>요르문간드와 서리 거인에 맞서 북유럽의 평화를 되찾으세요.</p>
                </div>
            </div>
        </section>
    </div>

    <footer style="text-align: center; padding: 50px; color: #94a3b8;">
        &copy; 2026 ANOTHER YOU PROJECT. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
