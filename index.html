<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROJECT: UNKNOWN | OFFICIAL SITE</title>
    <style>
        :root {
            --main-gold: #ffcc00;  /* 황금색 포인트 */
            --bg-deep: #0a0a0c;    /* 심해처럼 어두운 배경 */
            --card-glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-deep);
            color: #fff;
            font-family: 'Pretendard', sans-serif;
            overflow-x: hidden;
        }

        /* 1. 화려한 메인 비주얼 */
        .hero {
            height: 100vh;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), var(--bg-deep)),
                        url('https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=2070'); /* 신비로운 우주/배경 느낌 */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(3rem, 10vw, 6rem); /* 화면 크기에 따라 변하는 제목 */
            margin: 0;
            letter-spacing: 15px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--main-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 204, 0, 0.5));
        }

        .hero p {
            font-size: 1.5rem;
            letter-spacing: 3px;
            margin-top: 20px;
            color: #ccc;
        }

        /* 2. 게임 특징 섹션 */
        .features {
            padding: 100px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .feature-card {
            background: var(--card-glass);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
            backdrop-filter: blur(10px);
        }

        .feature-card:hover {
            transform: translateY(-10px);
            border-color: var(--main-gold);
            background: rgba(255, 204, 0, 0.05);
        }

        .feature-card h3 {
            color: var(--main-gold);
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        /* 3. 액션 버튼 (사전 예약 등) */
        .cta-button {
            margin-top: 40px;
            padding: 20px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            color: #000;
            background-color: var(--main-gold);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.4);
            transition: 0.3s;
        }

        .cta-button:hover {
            transform: scale(1.1);
            filter: brightness(1.1);
        }

        footer {
            text-align: center;
            padding: 50px;
            opacity: 0.5;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="hero">
        <p>2026 WINTER COMING SOON</p>
        <h1>[게임 제목을 입력하세요]</h1>
        <p>"[게임 한 줄 슬로건]"</p>
        <button class="cta-button">PRE-ORDER NOW</button>
    </div>

    <div class="features">
        <div class="feature-card">
            <h3>⚔️ 혁신적인 전투</h3>
            <p>[이 게임만의 특별한 전투 시스템이나 무기에 대해 적어보세요. 예: 실시간 중력 조작 액션!]</p>
        </div>
        <div class="feature-card">
            <h3>🌍 끝없는 오픈월드</h3>
            <p>[탐험하게 될 맵의 특징을 적어보세요. 예: 구름 위부터 심해까지 이어지는 거대한 대륙]</p>
        </div>
        <div class="feature-card">
            <h3>🧬 당신의 선택</h3>
            <p>[스토리의 특징을 적어보세요. 예: 당신의 결정이 세계의 멸망과 구원을 결정합니다.]</p>
        </div>
    </div>

    <footer>
        &copy; 2026 [사용자님 혹은 스튜디오 이름] ARCHIVE. ALL RIGHTS RESERVED.
    </footer>

</body>
</html>
